plugins { id 'com.android.application' }
android {
    namespace 'com.manhmoc.edgebar'
    compileSdk 34
    
    // KHOÁ CỨNG CHỮ KÝ OTA TẠI ĐÂY
    signingConfigs {
        release {
            storeFile file("../edge.keystore")
            storePassword "edge19"
            keyAlias "edge19"
            keyPassword "edge19"
        }
    }
    
    defaultConfig { applicationId "com.manhmoc.edgebar"; minSdk 26; targetSdk 34; versionCode 26; versionName "19.6" }
    
    buildTypes {
        debug { signingConfig signingConfigs.release }
        release { signingConfig signingConfigs.release; minifyEnabled false }
    }
}
