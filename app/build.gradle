plugins {
    id 'com.android.application'
}

android {
    namespace 'com.manhmoc.edgebar'
    compileSdk 34

    defaultConfig {
        applicationId "com.manhmoc.edgebar"
        minSdk 26
        targetSdk 34
        versionCode 64
        versionName "19.12.2.11"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
