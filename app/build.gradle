plugins { id 'com.android.application' }
android {
    namespace 'com.manhmoc.edgebar'
    compileSdk 34
    
    // Đã đổi tên thành "edgeKey" để không đụng hàng với hàm hệ thống
    signingConfigs {
        edgeKey {
            storeFile file("../edge.keystore")
            storePassword "edge19"
            keyAlias "edge19"
            keyPassword "edge19"
        }
    }
    
    defaultConfig { applicationId "com.manhmoc.edgebar"; minSdk 26; targetSdk 34; versionCode 27; versionName "19.7" }
    
    buildTypes {
        debug { signingConfig signingConfigs.edgeKey }
        release { signingConfig signingConfigs.edgeKey; minifyEnabled false }
    }
}
