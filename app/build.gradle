plugins { id 'com.android.application' }
android {
    namespace 'com.manhmoc.edgebar'
    compileSdk 34
    
    // KHOÁ CỨNG CHỮ KÝ BẰNG FILE KEYSTORE CỦA BẠN
    signingConfigs {
        edge19 {
            storeFile file("../edge.keystore")
            storePassword "edge19"
            keyAlias "edge19"
            keyPassword "edge19"
        }
    }
    
    defaultConfig { applicationId "com.manhmoc.edgebar"; minSdk 26; targetSdk 34; versionCode 28; versionName "19.7" }
    
    buildTypes {
        debug { signingConfig signingConfigs.edge19 }
        release { signingConfig signingConfigs.edge19; minifyEnabled false }
    }
}
